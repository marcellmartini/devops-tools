################################################################################
#
# Control plane initial installation
#
################################################################################
- name: Check if kubernetes config file exists
  become: true
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_config_file
  tags:
    - init

- name: Init kubernetes cluster
  become: true
  ansible.builtin.command:
    cmd: kubeadm init
  register: k8s_init
  changed_when: k8s_init.rc == 0
  when: not k8s_config_file.stat.exists and primary == "true"
  tags:
    - init

- name: Create ~/.kube directory.
  become: true
  ansible.builtin.file:
    path: ~/.kube
    state: directory
    mode: "0755"
  when: primary == "true"
  tags:
    - init

- name: Configure kube config.
  become: true
  ansible.builtin.file:
    src: /etc/kubernetes/admin.conf
    dest: ~/.kube/config
    state: link
    mode: "0644"
  when: primary == "true"
  tags:
    - init

- name: Install CNI (Weave Net)
  become: true
  ansible.builtin.command:
    cmd: kubectl apply -f {{ weave_net_yaml }}
  register: install_cni_weave
  changed_when: "'created' in install_cni_weave.stdout"
  failed_when: install_cni_weave.rc != 0
  when: primary == "true" and k8s_cni == "weave"
  tags:
    - init
