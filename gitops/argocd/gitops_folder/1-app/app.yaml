---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 1-app
  namespace: argocd # same namespace as argocd
spec:
  project: default
  source:
    repoURL: https://github.com/marcellmartini/devops-tools.git
    targetRevision: add-gitops
    path: gitops/argocd/apps/my-app
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespaces=false
      - PrunePropagationPolicy=foregroud
      - PruneLast=true
