apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  labels:
  name: argocd
  namespace: argocd
spec:
  gateways:
    - argocd-gateway
  hosts:
    - "*"
  http:
    - route:
        - destination:
            host: argocd-server.argocd.svc.cluster.local
            port:
              number: 80
